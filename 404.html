<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 — Страница не найдена | Муринск</title>
  <meta name="description" content="Страница не найдена на сайте Муринска. Вернитесь на главную и продолжайте исследовать город.">
  <meta name="robots" content="noindex, follow">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Unbounded:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --text: #1d1d1f;
      --sub: #6e6e73;
      --glass: rgba(255, 255, 255, 0.78);
      --border: rgba(255, 255, 255, 0.62);
      --highlight: rgba(255, 255, 255, 0.75);
      --shadow: rgba(0, 0, 0, 0.16);
      --accent: #4f90ff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 18% 20%, rgba(79, 144, 255, 0.18), transparent 40%),
        radial-gradient(circle at 82% 78%, rgba(131, 240, 255, 0.2), transparent 38%),
        var(--bg);
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      border-radius: 30px;
      background: linear-gradient(155deg, color-mix(in srgb, var(--glass) 88%, white 12%), color-mix(in srgb, var(--glass) 94%, transparent));
      border: 1px solid var(--border);
      box-shadow: 0 20px 48px var(--shadow), inset 0 1px 0 var(--highlight);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      text-align: center;
      padding: 48px 24px;
    }

    h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(42px, 8vw, 88px);
      line-height: 1;
      letter-spacing: 1px;
      margin-bottom: 16px;
    }

    p {
      font-size: clamp(10px, 2.4vw, 14px);
      line-height: 1.8;
      color: var(--sub);
      max-width: 560px;
      margin: 0 auto;
    }

    .actions {
      margin-top: 34px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
    }

    a {
      text-decoration: none;
      color: var(--text);
      border: 1px solid color-mix(in srgb, var(--border) 75%, transparent);
      background: color-mix(in srgb, var(--glass) 85%, transparent);
      border-radius: 999px;
      padding: 12px 18px;
      font-size: 10px;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 10px 24px var(--shadow);
    }

    a.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--accent), #54c3ff);
      border-color: transparent;
    }

    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 12px 28px var(--shadow);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>Похоже, эта страница потерялась где-то между кварталами Муринска. Вернитесь на главную или откройте карту, чтобы продолжить путь.</p>
    <div class="actions">
      <a class="primary" href="/">На главную</a>
      <a href="/history.html">История города</a>
      <a href="/gallery.html">Галерея</a>
    </div>
  </main>
</body>
</html>
