<style>
.liquid-glass,
.header-inner,
.controls button,
nav,
.suburb-popup{
backdrop-filter:blur(4px);
-webkit-backdrop-filter:blur(4px);
}

@supports not (hanging-punctuation:first) {
.liquid-glass,
.header-inner,
.controls button,
nav,
.suburb-popup{
backdrop-filter:url(#displacementFilter) blur(2px);
-webkit-backdrop-filter:url(#displacementFilter) blur(2px);
}
}

.brand-group{display:flex;align-items:center;position:relative;z-index:3;flex-shrink:0;}
.suburb-toggle{position:relative;margin-left:10px;}
.suburb-toggle summary{
list-style:none;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
user-select:none;
background:none;
border:0;
padding:2px 0;
line-height:1;
border-radius:999px;
}
.suburb-toggle summary::-webkit-details-marker{display:none;}
.suburb-toggle summary svg{
width:14px;
height:9px;
display:block;
margin-top:2px;
filter:drop-shadow(0 0 0 rgba(94, 145, 255, 0));
transition:transform .52s cubic-bezier(.2,.8,.2,1),filter .4s ease;
transform-origin:50% 50%;
transform:translateY(0) rotate(0deg) scale(1);
animation:suburb-diamond-idle 3.8s ease-in-out infinite;
}
.suburb-toggle summary path{
fill:none;
stroke:currentColor;
stroke-width:2.2;
stroke-linecap:round;
stroke-linejoin:round;
stroke-dasharray:30;
stroke-dashoffset:0;
transition:stroke-dashoffset .45s ease,opacity .35s ease;
}
.suburb-toggle[open] summary svg{
transform:translateY(1px) rotate(180deg) scale(1.08);
filter:drop-shadow(0 0 8px color-mix(in srgb,currentColor 35%, transparent));
animation:suburb-diamond-open .6s cubic-bezier(.2,.7,.2,1) 1;
}
.suburb-toggle.is-closing summary svg{
animation:suburb-diamond-close .46s cubic-bezier(.22,.9,.25,1) 1;
}
.suburb-toggle[open] summary path{
stroke-dashoffset:1.6;
opacity:.95;
animation:suburb-stroke-open .44s cubic-bezier(.2,.8,.2,1) 1;
}
.suburb-toggle.is-closing summary path{
animation:suburb-stroke-close .4s cubic-bezier(.2,.8,.2,1) 1;
}
.suburb-popup{
position:absolute;
top:calc(100% + 8px);
left:50%;
transform:translateX(-50%);
padding:10px 16px;
border-radius:14px;
border:1px solid color-mix(in srgb,var(--menu-border) 80%,white 20%);
background:
radial-gradient(120% 90% at 20% 0%,color-mix(in srgb,var(--menu-highlight) 80%,transparent),transparent 62%),
linear-gradient(160deg,color-mix(in srgb,var(--menu) 82%,white 18%),color-mix(in srgb,var(--menu) 94%,transparent));
box-shadow:0 16px 32px var(--shadow), inset 0 1px 0 color-mix(in srgb,var(--menu-highlight) 90%,transparent), inset 0 -1px 0 color-mix(in srgb,var(--menu-border) 65%,transparent);
font-size:11px;
letter-spacing:.02em;
text-transform:lowercase;
white-space:nowrap;
z-index:4;
opacity:0;
transform:translateX(-50%) translateY(-6px) scale(.95);
pointer-events:none;
transition:opacity .35s ease,transform .4s cubic-bezier(.22,1,.36,1);
}
.suburb-toggle[open] .suburb-popup{
opacity:1;
transform:translateX(-50%) translateY(0) scale(1);
pointer-events:auto;
}
.suburb-popup a{
color:inherit;
text-decoration:none;
}
.suburb-popup a:hover{
text-decoration:underline;
}
@keyframes suburb-diamond-idle{
0%,100%{transform:translateY(0) rotate(0deg) scale(1);}
45%{transform:translateY(-1px) rotate(0deg) scale(1.03);}
70%{transform:translateY(.5px) rotate(0deg) scale(.98);}
}
@keyframes suburb-diamond-open{
0%{transform:translateY(-1px) rotate(0deg) scale(.94);}
45%{transform:translateY(1px) rotate(205deg) scale(1.12);}
100%{transform:translateY(1px) rotate(180deg) scale(1.08);}
}
@keyframes suburb-diamond-close{
0%{transform:translateY(1px) rotate(180deg) scale(1.08);}
55%{transform:translateY(-1px) rotate(-18deg) scale(1.06);}
100%{transform:translateY(0) rotate(0deg) scale(1);}
}
@keyframes suburb-stroke-open{
0%{stroke-dashoffset:7.5;opacity:.5;}
100%{stroke-dashoffset:1.6;opacity:.95;}
}
@keyframes suburb-stroke-close{
0%{stroke-dashoffset:1.6;opacity:.95;}
100%{stroke-dashoffset:0;opacity:1;}
}
@media (prefers-reduced-motion: reduce){
.suburb-toggle summary svg,
.suburb-toggle summary path,
.suburb-popup{
animation:none;
transition:none;
}
}
</style>

<script>
document.querySelectorAll('.suburb-toggle').forEach((toggle)=>{
toggle.addEventListener('toggle',()=>{
if(toggle.open){
toggle.classList.remove('is-closing');

}
toggle.classList.add('is-closing');
setTimeout(()=>toggle.classList.remove('is-closing'),460);
});
});
</script>
