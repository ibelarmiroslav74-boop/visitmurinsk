<style>
.brand-group{display:flex;align-items:center;position:relative;z-index:3;flex-shrink:0;}
.suburb-toggle{position:static;margin-left:8px;}
.suburb-toggle summary{
list-style:none;
width:18px;
height:12px;
border-radius:50%;
border:1px solid color-mix(in srgb,var(--control-border) 70%,transparent);
background:color-mix(in srgb,var(--control-bg) 82%,transparent);
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
user-select:none;
font-size:14px;
line-height:1;
}
.suburb-toggle summary::-webkit-details-marker{display:none;}
.suburb-popup{
position:absolute;

left:0;
padding:10px 14px;
border-radius:12px;
border:1px solid var(--menu-border);
background:linear-gradient(160deg,color-mix(in srgb,var(--menu) 88%,white 12%),color-mix(in srgb,var(--menu) 94%,transparent));
box-shadow:0 14px 30px var(--shadow), inset 0 1px 0 var(--menu-highlight);
font-size:10px;
white-space:nowrap;
}
</style>
