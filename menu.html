<style>
details > summary::-webkit-details-marker{display:none;}
details > summary{list-style:none;}
summary::marker{content:"";}
.brand-group{display:flex;align-items:center;position:relative;z-index:3;flex-shrink:0;}
.suburb-switch{
position:absolute;
left:0;
top:calc(100% + 14px);
z-index:4;
animation:suburbFloat 4.2s ease-in-out infinite;
}
.city-note-switch{
position:absolute;
left:0;
top:calc(100% + 66px);
z-index:4;
animation:suburbFloat 4.2s ease-in-out infinite;
animation-delay:.25s;
}
.suburb-switch summary{
list-style:none;
cursor:pointer;
user-select:none;
color:inherit;
border:1px solid color-mix(in srgb,var(--menu-border) 82%,transparent);
background:linear-gradient(155deg,color-mix(in srgb,var(--menu) 86%,white 14%),color-mix(in srgb,var(--menu) 94%,transparent));
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
padding:9px 14px;
border-radius:12px;
font-family:'Unbounded',sans-serif;
font-size:10px;
letter-spacing:.05em;
text-transform:uppercase;
box-shadow:0 10px 24px var(--shadow),inset 0 1px 0 var(--menu-highlight);
backdrop-filter:blur(14px) saturate(135%);
-webkit-backdrop-filter:blur(14px) saturate(135%);
transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
}
.suburb-switch summary:hover{
transform:translateY(-2px);
box-shadow:0 14px 30px var(--shadow),inset 0 1px 0 var(--menu-highlight);
border-color:color-mix(in srgb,var(--menu-border) 95%,transparent);
}
.suburb-switch summary svg{width:14px;height:14px;display:block;stroke:currentColor;stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .28s ease;}
.suburb-switch[open] summary svg{transform:rotate(180deg);}
.city-note-switch summary{
list-style:none;
cursor:pointer;
user-select:none;
color:inherit;
border:1px solid color-mix(in srgb,var(--menu-border) 82%,transparent);
background:linear-gradient(155deg,color-mix(in srgb,var(--menu) 86%,white 14%),color-mix(in srgb,var(--menu) 94%,transparent));
display:inline-flex;
align-items:center;
justify-content:center;
gap:8px;
padding:9px 14px;
border-radius:12px;
font-family:'Unbounded',sans-serif;
font-size:10px;
letter-spacing:.05em;
text-transform:uppercase;
box-shadow:0 10px 24px var(--shadow),inset 0 1px 0 var(--menu-highlight);
backdrop-filter:blur(14px) saturate(135%);
-webkit-backdrop-filter:blur(14px) saturate(135%);
transition:transform .3s ease,box-shadow .3s ease,border-color .3s ease;
}
.city-note-switch summary:hover{
transform:translateY(-2px);
box-shadow:0 14px 30px var(--shadow),inset 0 1px 0 var(--menu-highlight);
border-color:color-mix(in srgb,var(--menu-border) 95%,transparent);
}
.city-note-switch summary svg{width:14px;height:14px;display:block;stroke:currentColor;stroke-width:3.2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:transform .28s ease;}
.city-note-switch[open] summary svg{transform:rotate(180deg);}

.suburb-menu{
position:absolute;
top:calc(100% + 8px);
left:0;
min-width:160px;
padding:8px;
border-radius:12px;
border:1px solid var(--menu-border);
background:var(--menu);
backdrop-filter:blur(14px) saturate(135%);
-webkit-backdrop-filter:blur(14px) saturate(135%);
box-shadow:0 10px 24px var(--shadow);
animation:suburbMenuReveal .35s ease both;
}
.suburb-menu a{display:block;text-decoration:none;color:inherit;font-size:12px;padding:8px 10px;border-radius:8px;font-family:'Unbounded',sans-serif;}
.city-note-menu{
position:absolute;
top:calc(100% + 8px);
left:0;
min-width:220px;
padding:12px 14px;
border-radius:12px;
border:1px solid var(--menu-border);
background:var(--menu);
backdrop-filter:blur(14px) saturate(135%);
-webkit-backdrop-filter:blur(14px) saturate(135%);
box-shadow:0 10px 24px var(--shadow);
animation:suburbMenuReveal .35s ease both;
font-size:10px;
line-height:1.7;
color:var(--text);
font-family:'Unbounded',sans-serif;
}

@keyframes suburbFloat{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-4px);}
}

@keyframes suburbMenuReveal{
from{opacity:0;transform:translateY(-8px) scale(.97)}
to{opacity:1;transform:translateY(0) scale(1)}
}

@media (max-width:560px){
.suburb-switch{top:calc(100% + 10px);}
.suburb-switch summary{font-size:9px;padding:8px 12px;}
.city-note-switch{top:calc(100% + 58px);}
.city-note-switch summary{font-size:9px;padding:8px 12px;}
}
</style>
